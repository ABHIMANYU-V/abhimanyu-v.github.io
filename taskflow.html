<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — Team Tasks</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f2ed;
    --surface: #faf8f5;
    --border: #e2ddd7;
    --text: #1a1714;
    --text-2: #6b6560;
    --text-3: #9e9994;
    --accent: #c8440a;
    --accent-soft: #fdf0eb;
    --low: #4a7c59;
    --low-bg: #edf5f0;
    --med: #c49a1a;
    --med-bg: #fdf7e3;
    --high: #c8440a;
    --high-bg: #fdf0eb;
    --done-text: #9e9994;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.05);
    --shadow-lg: 0 8px 32px rgba(0,0,0,.1);
    --radius: 10px;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    letter-spacing: -.5px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo span { color: var(--accent); font-style: italic; }

  .header-meta {
    font-size: 11px;
    color: var(--text-3);
    letter-spacing: .04em;
  }

  /* ── MAIN LAYOUT ── */
  .app {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .toolbar-label {
    font-size: 10px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-right: 2px;
  }

  .filter-group {
    display: flex;
    gap: 6px;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px 4px 10px;
  }

  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    border: none;
    background: none;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 5px;
    color: var(--text-2);
    transition: all .15s;
    font-weight: 500;
  }

  .filter-btn:hover { background: var(--bg); color: var(--text); }
  .filter-btn.active { background: var(--accent); color: #fff; }

  .spacer { flex: 1; }

  .btn-add {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: opacity .15s, transform .1s;
    letter-spacing: .02em;
  }

  .btn-add:hover { opacity: .88; transform: translateY(-1px); }
  .btn-add:active { transform: translateY(0); }

  /* ── TASK COUNT ── */
  .section-head {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 14px;
  }

  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--text);
  }

  .section-count {
    font-size: 11px;
    color: var(--text-3);
    letter-spacing: .04em;
  }

  /* ── TASK LIST ── */
  #task-list { display: flex; flex-direction: column; gap: 10px; }

  .empty-state {
    text-align: center;
    padding: 64px 32px;
    color: var(--text-3);
    font-size: 13px;
    line-height: 1.8;
  }

  .empty-state .em-icon { font-size: 32px; margin-bottom: 12px; }

  /* ── TASK CARD ── */
  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 24px 1fr auto;
    gap: 0 12px;
    align-items: start;
    box-shadow: var(--shadow);
    transition: box-shadow .15s, transform .15s, opacity .2s;
    animation: slideIn .2s ease both;
    position: relative;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .task-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
  .task-card.done { opacity: .6; }
  .task-card.done .task-title { text-decoration: line-through; color: var(--done-text); }

  /* checkbox */
  .task-check {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all .15s;
    margin-top: 1px;
    background: transparent;
  }

  .task-check:hover { border-color: var(--accent); }
  .task-check.checked { background: var(--accent); border-color: var(--accent); }
  .task-check.checked::after { content: '✓'; color: #fff; font-size: 11px; font-weight: bold; }

  /* body */
  .task-body { min-width: 0; }

  .task-title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 5px;
    word-break: break-word;
  }

  .task-desc {
    font-size: 11px;
    color: var(--text-2);
    margin-bottom: 8px;
    line-height: 1.6;
    font-weight: 300;
  }

  .task-meta {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
  }

  .badge {
    font-size: 10px;
    letter-spacing: .04em;
    border-radius: 4px;
    padding: 2px 7px;
    font-weight: 500;
  }

  .badge-priority-low  { background: var(--low-bg);  color: var(--low); }
  .badge-priority-med  { background: var(--med-bg);  color: var(--med); }
  .badge-priority-high { background: var(--high-bg); color: var(--high); }

  .badge-user {
    background: #eef0f7;
    color: #4a5080;
  }

  .badge-due {
    background: #f0f0f0;
    color: var(--text-2);
  }

  .badge-due.overdue { background: var(--high-bg); color: var(--high); }

  .task-done-at {
    font-size: 10px;
    color: var(--text-3);
    font-style: italic;
    margin-top: 4px;
  }

  /* actions */
  .task-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }

  .icon-btn {
    width: 28px; height: 28px;
    border: none;
    background: none;
    cursor: pointer;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    color: var(--text-3);
    transition: all .15s;
  }

  .icon-btn:hover { background: var(--bg); color: var(--text); }
  .icon-btn.del:hover { background: var(--high-bg); color: var(--high); }

  /* ── MODAL ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(26,23,20,.35);
    backdrop-filter: blur(3px);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
  }

  .overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow-lg);
    width: 440px;
    max-width: calc(100vw - 40px);
    padding: 28px;
    transform: translateY(12px) scale(.97);
    transition: transform .2s ease;
  }

  .overlay.open .modal { transform: translateY(0) scale(1); }

  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    margin-bottom: 22px;
    color: var(--text);
  }

  .form-row { margin-bottom: 16px; }

  label {
    display: block;
    font-size: 10px;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 6px;
    font-weight: 500;
  }

  input[type=text], input[type=date], textarea, select {
    width: 100%;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 11px;
    color: var(--text);
    outline: none;
    transition: border-color .15s;
    -webkit-appearance: none;
  }

  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 70px; }

  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 24px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
  }

  .btn-ghost {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-2);
    border-radius: 7px;
    padding: 8px 16px;
    cursor: pointer;
    transition: all .15s;
  }

  .btn-ghost:hover { border-color: var(--text); color: var(--text); }

  .btn-primary {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: 8px 18px;
    cursor: pointer;
    transition: opacity .15s;
  }

  .btn-primary:hover { opacity: .85; }

  /* ── PRIORITY STRIPE ── */
  .task-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: var(--radius) 0 0 var(--radius);
  }

  .task-card[data-priority=low]::before  { background: var(--low); }
  .task-card[data-priority=med]::before  { background: var(--med); }
  .task-card[data-priority=high]::before { background: var(--high); }
</style>
</head>
<body>

<header>
  <div class="logo">Task<span>Flow</span></div>
  <div class="header-meta" id="hdr-meta"></div>
</header>

<div class="app">

  <div class="toolbar">
    <span class="toolbar-label">Assignee</span>
    <div class="filter-group" id="user-filters">
      <button class="filter-btn active" data-filter-user="all">All</button>
      <button class="filter-btn" data-filter-user="Alice">Alice</button>
      <button class="filter-btn" data-filter-user="Bob">Bob</button>
      <button class="filter-btn" data-filter-user="Carol">Carol</button>
    </div>

    <span class="toolbar-label" style="margin-left:6px">Priority</span>
    <div class="filter-group" id="priority-filters">
      <button class="filter-btn active" data-filter-priority="all">All</button>
      <button class="filter-btn" data-filter-priority="high">High</button>
      <button class="filter-btn" data-filter-priority="med">Med</button>
      <button class="filter-btn" data-filter-priority="low">Low</button>
    </div>

    <div class="spacer"></div>
    <button class="btn-add" id="btn-new">＋ New Task</button>
  </div>

  <div class="section-head">
    <span class="section-title">Tasks</span>
    <span class="section-count" id="task-count"></span>
  </div>

  <div id="task-list"></div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">New Task</div>
    <div class="form-row">
      <label>Title *</label>
      <input type="text" id="f-title" placeholder="What needs to be done?">
    </div>
    <div class="form-row">
      <label>Description</label>
      <textarea id="f-desc" placeholder="Optional details…"></textarea>
    </div>
    <div class="form-row-2">
      <div class="form-row" style="margin-bottom:0">
        <label>Assignee</label>
        <select id="f-user">
          <option value="Alice">Alice</option>
          <option value="Bob">Bob</option>
          <option value="Carol">Carol</option>
        </select>
      </div>
      <div class="form-row" style="margin-bottom:0">
        <label>Priority</label>
        <select id="f-priority">
          <option value="high">High</option>
          <option value="med">Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
    </div>
    <div class="form-row" style="margin-top:16px">
      <label>Due Date</label>
      <input type="date" id="f-due">
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" id="btn-cancel">Cancel</button>
      <button class="btn-primary" id="btn-save">Save Task</button>
    </div>
  </div>
</div>

<script>
// ── DATA ────────────────────────────────────────────────────────────────────

let tasks = [
  { id: 1, title: 'Design onboarding wireframes', desc: 'Cover sign-up and first-run flows', user: 'Alice', priority: 'high', due: '2026-03-28', done: false, doneAt: null },
  { id: 2, title: 'Write unit tests for auth module', desc: '', user: 'Bob', priority: 'med', due: '2026-04-02', done: false, doneAt: null },
  { id: 3, title: 'Update README with setup instructions', desc: 'Include Docker and local dev steps', user: 'Carol', priority: 'low', due: '2026-04-05', done: true, doneAt: '2026-03-24T09:12:00Z' },
  { id: 4, title: 'Fix login redirect bug', desc: '', user: 'Alice', priority: 'high', due: '2026-03-26', done: false, doneAt: null },
  { id: 5, title: 'Review pull request #42', desc: '', user: 'Bob', priority: 'med', due: '2026-03-27', done: false, doneAt: null },
];
let nextId = 6;
let filterUser = 'all';
let filterPriority = 'all';
let editingId = null;

// ── RENDER ───────────────────────────────────────────────────────────────────

function priorityLabel(p) { return p === 'med' ? 'Medium' : p.charAt(0).toUpperCase() + p.slice(1); }

function dueBadge(due, done) {
  if (!due) return '';
  const today = new Date().toISOString().slice(0,10);
  const overdue = !done && due < today;
  return `<span class="badge badge-due${overdue ? ' overdue' : ''}">${fmtDate(due)}${overdue ? ' ⚠' : ''}</span>`;
}

function fmtDate(d) {
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y.slice(2)}`;
}

function fmtTs(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'2-digit', hour:'2-digit', minute:'2-digit' });
}

function render() {
  const visible = tasks.filter(t =>
    (filterUser === 'all' || t.user === filterUser) &&
    (filterPriority === 'all' || t.priority === filterPriority)
  );

  const list = document.getElementById('task-list');
  const count = document.getElementById('task-count');

  count.textContent = `${visible.length} task${visible.length !== 1 ? 's' : ''}`;
  document.getElementById('hdr-meta').textContent = `${tasks.filter(t=>t.done).length} / ${tasks.length} completed`;

  if (!visible.length) {
    list.innerHTML = `<div class="empty-state"><div class="em-icon">✦</div>No tasks match this filter.<br>Add one above or change the filter.</div>`;
    return;
  }

  list.innerHTML = visible.map(t => `
    <div class="task-card${t.done ? ' done' : ''}" data-priority="${t.priority}" data-id="${t.id}">
      <div class="task-check${t.done ? ' checked' : ''}" onclick="toggleDone(${t.id})"></div>
      <div class="task-body">
        <div class="task-title">${esc(t.title)}</div>
        ${t.desc ? `<div class="task-desc">${esc(t.desc)}</div>` : ''}
        <div class="task-meta">
          <span class="badge badge-priority-${t.priority}">${priorityLabel(t.priority)}</span>
          <span class="badge badge-user">${t.user}</span>
          ${dueBadge(t.due, t.done)}
        </div>
        ${t.done && t.doneAt ? `<div class="task-done-at">Completed ${fmtTs(t.doneAt)}</div>` : ''}
      </div>
      <div class="task-actions">
        <button class="icon-btn" onclick="openEdit(${t.id})" title="Edit">✎</button>
        <button class="icon-btn del" onclick="deleteTask(${t.id})" title="Delete">✕</button>
      </div>
    </div>
  `).join('');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── ACTIONS ──────────────────────────────────────────────────────────────────

function toggleDone(id) {
  const t = tasks.find(t => t.id === id);
  t.done = !t.done;
  t.doneAt = t.done ? new Date().toISOString() : null;
  render();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  render();
}

function openEdit(id) {
  const t = tasks.find(t => t.id === id);
  editingId = id;
  document.getElementById('modal-title').textContent = 'Edit Task';
  document.getElementById('f-title').value = t.title;
  document.getElementById('f-desc').value = t.desc;
  document.getElementById('f-user').value = t.user;
  document.getElementById('f-priority').value = t.priority;
  document.getElementById('f-due').value = t.due || '';
  openModal();
}

// ── MODAL ────────────────────────────────────────────────────────────────────

function openModal() { document.getElementById('overlay').classList.add('open'); }
function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editingId = null;
  document.getElementById('f-title').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-user').value = 'Alice';
  document.getElementById('f-priority').value = 'high';
  document.getElementById('f-due').value = '';
  document.getElementById('modal-title').textContent = 'New Task';
}

document.getElementById('btn-new').addEventListener('click', () => { editingId = null; openModal(); });
document.getElementById('btn-cancel').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

document.getElementById('btn-save').addEventListener('click', () => {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }
  const data = {
    title,
    desc: document.getElementById('f-desc').value.trim(),
    user: document.getElementById('f-user').value,
    priority: document.getElementById('f-priority').value,
    due: document.getElementById('f-due').value || null,
  };
  if (editingId) {
    Object.assign(tasks.find(t => t.id === editingId), data);
  } else {
    tasks.unshift({ id: nextId++, done: false, doneAt: null, ...data });
  }
  closeModal();
  render();
});

// ── FILTERS ──────────────────────────────────────────────────────────────────

document.getElementById('user-filters').addEventListener('click', e => {
  const btn = e.target.closest('[data-filter-user]');
  if (!btn) return;
  filterUser = btn.dataset.filterUser;
  document.querySelectorAll('[data-filter-user]').forEach(b => b.classList.toggle('active', b === btn));
  render();
});

document.getElementById('priority-filters').addEventListener('click', e => {
  const btn = e.target.closest('[data-filter-priority]');
  if (!btn) return;
  filterPriority = btn.dataset.filterPriority;
  document.querySelectorAll('[data-filter-priority]').forEach(b => b.classList.toggle('active', b === btn));
  render();
});

// ── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
